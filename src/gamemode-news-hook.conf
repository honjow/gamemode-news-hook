[hook]
# Steam community group Account ID / Steam 社区组账号 ID（Account ID）
clan_id = 46072739

# Valve appid to replace (1675200 = Steam Deck updates) / 要替换的 Valve 应用 appid（1675200 = Steam Deck 更新）
target_appid = 1675200

# CEF remote debugging endpoint / CEF 远程调试地址与端口
cef_host = localhost
cef_port = 8080

# Steam API language code: "auto" detects from Steam client, or explicit like "6_0"
# Steam API 语言参数：auto 自动检测 Steam 客户端语言，或显式指定如 6_0
lang_list = auto

# Daemon: seconds between hook liveness checks / 守护模式：钩子存活检测间隔（秒）
monitor_interval = 5

# Min seconds between announcement re-fetches in JS / JS 内重新拉取公告的最小间隔（秒）
refresh_debounce = 10

# Per-language community group overrides (Steam language name = clan Account ID)
# When lang_list=auto, the detected language is looked up here to select a group.
# 按语言指定不同社区组（Steam 语言名 = 社区组 Account ID）
# lang_list=auto 时，检测到的语言会在此查找对应的组。
[lang_map]
english = 46072739
schinese = 46069703
