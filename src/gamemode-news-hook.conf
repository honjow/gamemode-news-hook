[hook]
# Valve appid to replace (1675200 = Steam Deck updates) / 要替换的 Valve 应用 appid（1675200 = Steam Deck 更新）
target_appid = 1675200

# CEF remote debugging endpoint / CEF 远程调试地址与端口
cef_host = localhost
cef_port = 8080

# Steam API language code: "auto" detects from Steam client, or explicit like "6_0"
# Steam API 语言参数：auto 自动检测 Steam 客户端语言，或显式指定如 6_0
lang_list = auto

# Daemon: seconds between hook liveness checks / 守护模式：钩子存活检测间隔（秒）
# Also acts as the bridge interval that propagates user-triggered in-page
# refreshes (Check for updates) from SharedJSContext to BigPicture.
# 同时作为"用户触发的页内刷新（检查更新）"从 SJC 同步到 BigPicture 的桥接间隔。
monitor_interval = 5

# Daemon: seconds between background refresh of remote announcements
# (uses HTTP If-None-Match / ETag; 0 to disable).
# 守护模式：远程公告后台回拉间隔（秒），使用 HTTP ETag 协商缓存；0 禁用。
repo_refresh_interval = 1800

# Raw URLs for announcements.json, tried in order (mirror first).
# announcements.json 的 raw URL，按顺序尝试（镜像优先）。
[repo_mirrors]
github = https://raw.githubusercontent.com/SkorionOS/gamemode-news/master/announcements.json
