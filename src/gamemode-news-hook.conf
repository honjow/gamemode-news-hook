# Per-channel announcement filtering via title prefix.
# Map a single-char prefix to an OS branch name (from SteamClient.Updates).
# Announcements with title "[X] ..." only show when current branch matches.
# Announcements without a prefix are shown on all channels.
# 按通道过滤公告：标题前缀映射到 OS 分支名。
# 带 [X] 前缀的公告仅在匹配的分支显示，无前缀的公告全通道显示。
[channel_prefix]
# S = rel
# B = beta
# P = preview

# Raw URLs for announcements.json, tried in order (mirror first).
# announcements.json 的 raw URL，按顺序尝试（镜像优先）。
[repo_mirrors]
# gitee = https://gitee.com/honjow/gamemode-news/raw/master/announcements.json
github = https://raw.githubusercontent.com/SkorionOS/gamemode-news/master/announcements.json
